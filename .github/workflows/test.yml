# This workflow will install Python dependencies, lint and run tests.
# For more information see: https://docs.github.com/en/actions/use-cases-and-examples/building-and-testing/building-and-testing-python

name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  code-quality:
    strategy:
      matrix:
        os:
          - ubuntu-latest
    runs-on: ${{matrix.os}}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
          enable-cache: true

      # NOTE: basedpyright needs the venv with everything installed
      - name: Install deps
        run: |
          uv sync --no-dev --frozen
          uv pip install "basedpyright>=1.38.2" "ruff>=0.15.5"

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run basedpyright

  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    runs-on: ${{matrix.os}}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group test --frozen

      - name: Run tests
        run: uv run pytest
